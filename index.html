<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eduardo Chavez – Portfolio</title>
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/whitelogo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/whitelogo.png">
  <link rel="apple-touch-icon" href="assets/images/whitelogo.png">
  <link rel="shortcut icon" href="assets/images/whitelogo.png">
  <meta name="theme-color" content="#0b1220">
  <style>
    :root{
      --accent:#ffe44d;
      --text:#ffffff;
      --muted:rgba(255,255,255,.84);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; }
    body{
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#161a1f,#0f1114 45%, #1e232a 100%);
      display:block;
      overflow:hidden;
    }
    .center-wrap{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .bg-video{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:right center;
      filter:grayscale(1) brightness(.42);
      transform:scale(1.04);
      z-index:-3;
    }
    .video-mask{
      position:fixed;
      inset:0;
      z-index:-2;
      pointer-events:none;
      background:
        /* soften left edge where video crops */
        linear-gradient(to right, rgba(0,0,0,.82) 0%, rgba(0,0,0,.46) 28%, rgba(0,0,0,.12) 50%, rgba(0,0,0,0) 70%),
        /* subtle top/bottom edge cleanup */
        linear-gradient(to bottom, rgba(0,0,0,.34), rgba(0,0,0,.08) 28%, rgba(0,0,0,.08) 72%, rgba(0,0,0,.42)),
        /* targeted dark patch for any corner logo/watermark */
        radial-gradient(320px 240px at 92% 90%, rgba(0,0,0,.90) 0%, rgba(0,0,0,.68) 38%, rgba(0,0,0,0) 76%);
    }
    .overlay{
      position:fixed;
      inset:0;
      background:
        radial-gradient(1200px 600px at 50% 18%, rgba(0,0,0,.16), rgba(0,0,0,.78)),
        linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.72));
      z-index:-1;
    }
    .overlay::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,228,77,.10), transparent 36%, transparent 64%, rgba(255,228,77,.08));
      mix-blend-mode:screen;
      opacity:.58;
      pointer-events:none;
    }
    .card{
      width:min(680px, 94vw);
      border:1px solid rgba(255,255,255,.14);
      background:rgba(10,12,16,.58);
      backdrop-filter:blur(8px) saturate(1.1);
      border-radius:18px;
      padding:30px 24px;
      text-align:center;
      box-shadow:0 28px 80px rgba(0,0,0,.45);
      animation:cardIn .58s ease both;
    }
    .logo{
      width:84px;
      height:84px;
      object-fit:contain;
      margin:0 auto 14px;
      display:block;
      filter:drop-shadow(0 10px 24px rgba(0,0,0,.38));
      animation:logoPulse 2.8s ease-in-out infinite alternate;
    }
    .kicker{
      margin:0 0 6px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.74);
    }
    h1{ margin:0 0 8px; font-size:clamp(30px,5vw,44px); letter-spacing:-.02em; }
    p{ margin:0 0 22px; color:var(--muted); line-height:1.6; }
    .actions{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .btn{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.25);
      color:#fff;
      background:rgba(255,255,255,.04);
      transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,.11); border-color:rgba(255,255,255,.42); box-shadow:0 12px 24px rgba(0,0,0,.24); }
    .btn.primary{ background:var(--accent); color:#000; border-color:var(--accent); box-shadow:0 10px 28px rgba(255,228,77,.22); }
    .btn.primary:hover{ box-shadow:0 14px 30px rgba(255,228,77,.30); }
    .meta{ margin-top:16px; font-size:13px; color:rgba(255,255,255,.76); }
    .meta a{ color:#fff; }

    /* Custom cursor (landing page) */
    .custom-cursor{
      position:fixed;
      left:0;
      top:0;
      width:18px;
      height:18px;
      border-radius:999px;
      pointer-events:none;
      z-index:20000;
      opacity:0;
      transform:translate(-50%,-50%) scale(.92);
      transition:opacity .12s ease, transform .12s ease;
      display:none;
      border:2px solid rgba(255,255,255,.9);
      background-color:rgba(0,0,0,.18);
      backdrop-filter:saturate(1.2) blur(2px);
    }
    html.cursor-enabled .custom-cursor{display:block}
    .custom-cursor.is-visible{opacity:1;transform:translate(-50%,-50%) scale(1)}

    html.cursor-enabled,
    html.cursor-enabled body,
    html.cursor-enabled *{cursor:none !important}

    @keyframes cardIn{
      from{ opacity:0; transform:translateY(12px) scale(.985); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes logoPulse{
      from{ transform:translateY(0) scale(1); opacity:.92; }
      to{ transform:translateY(-1px) scale(1.02); opacity:1; }
    }
    @media (prefers-reduced-motion: reduce){
      .logo,.card{ animation:none; }
      .custom-cursor{ transition:none; }
    }
    @media (max-width: 680px){
      .actions{ grid-template-columns:1fr; }
      .card{ padding:26px 18px; }
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
    <source src="assets/images/moviewater.mp4" type="video/mp4" />
  </video>
  <div class="video-mask" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <div class="center-wrap">
    <main class="card" aria-label="Portfolio selector">
      <img src="assets/images/ecmonogramwhite2.png" alt="EC logo" class="logo" />
      <p class="kicker">Eduardo Chavez</p>
      <h1>Choose a portfolio</h1>
      <p>Welcome to my work. Choose where you want to start.</p>

      <div class="actions">
        <a class="btn primary" href="packaging.html">Packaging Design</a>
        <a class="btn" href="graphic.html">Graphic Design</a>
      </div>

      <p class="meta">
        Eduardo Chavez · Visual + Packaging Designer ·
        <a href="https://www.linkedin.com/in/eduardoadanc/" target="_blank" rel="noopener">LinkedIn</a>
      </p>
    </main>
  </div>

  <div id="customCursor" class="custom-cursor" aria-hidden="true"></div>

  <script>
    (() => {
      const supportsFinePointer =
        window.matchMedia?.('(pointer: fine)').matches &&
        window.matchMedia?.('(hover: hover)').matches;
      if (!supportsFinePointer) return;

      const cursorEl = document.getElementById('customCursor');
      if (!cursorEl) return;

      const root = document.documentElement;
      let enabled = false;
      const enable = () => {
        if (enabled) return;
        enabled = true;
        root.classList.add('cursor-enabled');
      };

      let x = 0;
      let y = 0;
      let raf = 0;
      let visible = false;

      const render = () => {
        raf = 0;
        cursorEl.style.left = x + 'px';
        cursorEl.style.top = y + 'px';
      };

      const setPos = (e) => {
        x = e.clientX;
        y = e.clientY;
        if (!raf) raf = window.requestAnimationFrame(render);
      };

      const setVisible = (on) => {
        visible = on;
        cursorEl.classList.toggle('is-visible', on);
      };

      window.addEventListener('pointermove', (e) => {
        if (e.pointerType && e.pointerType !== 'mouse') return;
        enable();
        setPos(e);
        if (!visible) setVisible(true);
      }, { passive: true });

      window.addEventListener('blur', () => setVisible(false));
      window.addEventListener('mouseleave', () => setVisible(false));
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) setVisible(false);
      });
    })();
  </script>
</body>
</html>
